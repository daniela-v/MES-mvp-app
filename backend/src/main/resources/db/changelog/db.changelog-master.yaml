databaseChangeLog:
  - changeSet:
      id: 1
      author: dani
      changes:
        - createTable:
            tableName: courses
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: subject, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: school_year, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: price, type: "DECIMAL(10,2)", constraints: { nullable: false } }

        - createTable:
            tableName: students
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: email, type: VARCHAR(255), constraints: { nullable: false, unique: true } }
              - column: { name: password_hash, type: VARCHAR(255) }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }

        - createTable:
            tableName: orders
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: parent_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: parent_email, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: course_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: student_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: student_email, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: checkout_id, type: VARCHAR(255), constraints: { nullable: false, unique: true } }

        - addForeignKeyConstraint:
            baseTableName: orders
            baseColumnNames: course_id
            constraintName: fk_orders_course
            referencedTableName: courses
            referencedColumnNames: id


        - createTable:
            tableName: payments
            columns:
              - column: { name: id, type: VARCHAR(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: order_id, type: BIGINT, constraints: { nullable: false, unique: true } }
              - column: { name: amount, type: "DECIMAL(10,2)", constraints: { nullable: false } }
              - column: { name: currency, type: VARCHAR(3), constraints: { nullable: false } }
              - column: { name: provider, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: provider_payment_id, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: paid_at, type: TIMESTAMP, constraints: { nullable: false } }

        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: order_id
            constraintName: fk_payments_order
            referencedTableName: orders
            referencedColumnNames: id

        - createTable:
            tableName: enrolments
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: course_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: order_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: valid_until, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(50), constraints: { nullable: false } }

        - addForeignKeyConstraint:
            baseTableName: enrolments
            baseColumnNames: student_id
            constraintName: fk_enrolments_student
            referencedTableName: students
            referencedColumnNames: id

        - addForeignKeyConstraint:
            baseTableName: enrolments
            baseColumnNames: course_id
            constraintName: fk_enrolments_course
            referencedTableName: courses
            referencedColumnNames: id

        - addForeignKeyConstraint:
            baseTableName: enrolments
            baseColumnNames: order_id
            constraintName: fk_enrolments_order
            referencedTableName: orders
            referencedColumnNames: id

        - createTable:
            tableName: onboarding
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: student_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: token, type: VARCHAR(255), constraints: { nullable: false, unique: true } }
              - column: { name: expires_at, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: completed_at, type: TIMESTAMP }

        - addForeignKeyConstraint:
            baseTableName: onboarding
            baseColumnNames: student_id
            constraintName: fk_onboarding_student
            referencedTableName: students
            referencedColumnNames: id

        - createTable:
            tableName: lessons
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: course_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: title, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: content, type: CLOB, constraints: { nullable: false } }
              - column: { name: lesson_sequence, type: INT, constraints: { nullable: false } }

        - addForeignKeyConstraint:
            baseTableName: lessons
            baseColumnNames: course_id
            constraintName: fk_lessons_course
            referencedTableName: courses
            referencedColumnNames: id

  - changeSet:
      id: 2
      author: dani
      changes:
        - sql:
            splitStatements: true
            sql: |
              INSERT INTO courses(id, subject, school_year, price) VALUES (1, 'Maths', 'YEAR_FIVE', 199.00);
