              INSERT INTO courses(id, subject, school_year, price) VALUES (3, 'English', 'YEAR_SEVEN', 179.00);
              INSERT INTO courses(id, subject, school_year, price) VALUES (4, 'History', 'YEAR_FIVE', 169.00);
              INSERT INTO courses(id, subject, school_year, price) VALUES (5, 'Geography', 'YEAR_SIX', 189.00);
              INSERT INTO courses(id, subject, school_year, price) VALUES (6, 'Computing', 'YEAR_SEVEN', 229.00);

              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (1, 1, 'Numbers Basics', 'Introduction to numbers and operations.', 1);
              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (2, 1, 'Fractions', 'Understanding fractions and practical examples.', 2);
              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (3, 2, 'Scientific Method', 'Observation, hypothesis, experiments and results.', 1);
              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (4, 2, 'Energy', 'Forms of energy and transformations.', 2);
              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (5, 3, 'Grammar Essentials', 'Nouns, verbs, adjectives and sentence structure.', 1);
              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (6, 3, 'Reading Comprehension', 'Strategies for understanding texts.', 2);
              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (7, 4, 'Ancient Civilisations', 'Explore early societies and how historians use evidence.', 1);
              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (8, 4, 'Timelines and Sources', 'Learn to interpret chronology and primary sources.', 2);
              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (9, 5, 'Maps and Coordinates', 'Use maps, coordinates and scale to understand places.', 1);
              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (10, 5, 'Weather and Climate', 'Understand weather patterns and climate zones.', 2);
              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (11, 6, 'Programming Basics', 'Introduction to algorithms, sequencing and simple programs.', 1);
              INSERT INTO lessons(id, course_id, title, content, lesson_sequence) VALUES (12, 6, 'Data and the Web', 'Learn how data is represented and shared online.', 2);
